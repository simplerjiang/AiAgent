name: release-windows

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        shell: pwsh
        run: npm ci --prefix .\frontend

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Resolve release version
        shell: pwsh
        run: |
          $releaseVersion = $env:GITHUB_REF_NAME.TrimStart('v')
          "RELEASE_VERSION=$releaseVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build packaged app
        shell: pwsh
        run: .\scripts\publish-windows-package.ps1 -Configuration Release -RuntimeIdentifier win-x64 -SelfContained:$true

      - name: Build installer
        shell: pwsh
        run: .\scripts\build-windows-installer.ps1 -SkipPackagePublish -AppVersion $env:RELEASE_VERSION -SelfContained:$true

      - name: Create portable zip
        shell: pwsh
        run: Compress-Archive -Path .\artifacts\windows-package\* -DestinationPath .\artifacts\SimplerJiangAiAgent-portable-$env:RELEASE_VERSION.zip -Force

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/installer/SimplerJiangAiAgent-Setup-${{ env.RELEASE_VERSION }}.exe
            artifacts/SimplerJiangAiAgent-portable-${{ env.RELEASE_VERSION }}.zip